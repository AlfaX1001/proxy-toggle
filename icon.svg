<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="100%" style="stop-color:#a5b4fc"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Globe -->
  <circle cx="256" cy="240" r="120" fill="none" stroke="url(#globe)" stroke-width="16"/>
  <ellipse cx="256" cy="240" rx="60" ry="120" fill="none" stroke="url(#globe)" stroke-width="12" opacity="0.6"/>
  <line x1="136" y1="240" x2="376" y2="240" stroke="url(#globe)" stroke-width="12" opacity="0.6"/>
  <line x1="200" y1="145" x2="312" y2="145" stroke="url(#globe)" stroke-width="8" opacity="0.4"/>
  <line x1="200" y1="335" x2="312" y2="335" stroke="url(#globe)" stroke-width="8" opacity="0.4"/>
  
  <!-- Lightning bolt (toggle/speed) -->
  <path d="M276 160 L236 260 L260 260 L240 360 L296 240 L272 240 Z" fill="url(#arrow)" stroke="#fbbf24" stroke-width="4" stroke-linejoin="round"/>
</svg>
